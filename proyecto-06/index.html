<!--  

    ----------  Enunciado Proyecto 6  ----------  

    -  Muestra los números del 1 al 177 directamente en la página. 
    -  Sin usar el "DOM" y sin usar un bucle for.
    -  Mostrar estilos sin usar una hoja aparte.
                     
-->


<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Proyecto 6 JS - + 100 Proyectos HTML, CSS y JS </title>
    <link rel="icon" href="/curso-100-proyectos-html-css-js/03-proyectos-javascript/assets/favicon/javascript-icon.ico">

    <style>
        
        body {
            margin: 0 auto;
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-size: 20px;
            font-weight: bold;

            background-image: radial-gradient(circle at center, #FFF991 0%, transparent 70%);
            mix-blend-mode: multiply;
        }

        h1,
        h2,
        hr {
            width: 95%;
            display: flex;
            justify-content: center;
            text-align: center;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 30px;
        }

        h2 {
            font-size: 25px;
            margin-bottom: 10px;
        }
                
        div {
            width: 95%;
            display: flex;
            flex-direction: column;
            text-align: justify;
        }

        p {
            font-size: 20px;
            text-align: justify;
            margin: 10px;
        }
       
        hr {
            height: 2px;
        }
       
    </style>

</head>

<body>

    <hr>
    <h1> ----- Proyecto 6 JavaScript ----- </h1>
    <hr>

    <div>

        <h2> ------ Enunciado Proyecto 6 JS Externo ---------- </h2>
        <p> - Muestra los números del 1 al 177 directamente en la página. </p>
        <p> - Sin usar el "DOM" y sin usar un bucle for. </p>
        <p> - Mostrar estilos sin usar una hoja aparte. </p>

    </div>

    <hr> <br>

    <script>

        let numero = 1;

        while (numero <= 177) {

            if (numero === 177) document.write(numero);
            else document.write(numero + ', ');
       
            numero++;
        }

    </script>

    <br> <br>
    <hr>


</body>

</html>
