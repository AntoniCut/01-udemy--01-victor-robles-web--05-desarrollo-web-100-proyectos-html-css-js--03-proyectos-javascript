<!--  

    ----------  Enunciado Proyecto 23  ----------  

    -  Necesitamos hacer un validador de emails.
       Si el email es correcto mostrara un check y si es incorrecto una cruz. Ver PDF.
    -  Expresión regular validar email mas robusta:
        let pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

-->


<div class="main__container">

    <form class="main__validation-email">

        <input type="email" id="email" class="validation-email__input" placeholder="Introduce tu Email">

        <div class="validation-email__icons">
            <i class="icons__check fa-solid fa-circle-check"> </i>
            <i class="icons__xmark fa-solid fa-circle-xmark"> </i>
        </div>

    </form>

</div>
