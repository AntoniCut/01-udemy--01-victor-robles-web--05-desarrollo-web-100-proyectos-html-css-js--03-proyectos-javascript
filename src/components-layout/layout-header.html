<!--  ----------  HEADER  ----------  -->
<div class="header__container">


    <!--  -----  Contenedor del Botón del Menú, logo y descripción -----  -->
    <div class="header__container-logos-left">

        <!--  -----  Botón del Menú Hamburguesa de Navegación Open -----  -->
        <div class="navbar__btn-open">
            <div class="btn__icon-open"> </div>
            <div class="btn__icon-open"> </div>
            <div class="btn__icon-open"> </div>
        </div>

        <!--  -----  Botón del Menú Hamburguesa de Navegación Close -----  -->
        <div class="navbar__btn-close">
            <div class="btn__icon-close"> </div>
            <div class="btn__icon-close"> </div>
        </div>

        <!--  -----  Descripción -----  -->
        <div class="javascript__description">
            <h3> 50 Proyectos JavaScript </h3>
        </div>

        <!--  -----  logos  -----  -->
        <div class="javascript__logos">

            <!--  -----  logo de GitHub -----  -->
            <a href="https://github.com/AntoniCut/jquery.antonydev.tech" target="_blank" rel="noopener noreferrer">
                <img class="github-logo"
                    src="/01-victor-robles-web/05-desarrollo-web-100-proyectos-html-css-js/03-proyectos-javascript/assets/img/github/github-icon.svg"
                    alt="Logo GitHub">
            </a>

            <!--  -----  Logo de JavaScript -----  -->
            <a href="https://www.javascript.com/" target="_blank" rel="noopener noreferrer">
                <img class="javascript__logo"
                    src="/01-victor-robles-web/05-desarrollo-web-100-proyectos-html-css-js/03-proyectos-javascript/assets/img/js/js-logo.svg"
                    alt="Banner JavaScript">
            </a>

        </div>



    </div>


    <!--  
        ---------------------------------------------
        -----  Contenedor del Título del Header -----
        ---------------------------------------------
    -->

    <div class="header__container-title">

        <!--  -----  Título del Header -----  -->
        <h1 class="header__title">

            <!--  -----  renderizado del título con el plugin de jQuery  -----  -->
            <p id="headerTitle"> </p>

        </h1>

    </div>


    <!--  
        --------------------------------------------------------------------
        -----  Contenedor de los Logos y Banners de jQuery UI y Cursos -----
        --------------------------------------------------------------------
    -->

    <div class="header__container-logos-right">


        <!--  -----  Descripción -----  -->
        <div class="javascript__description">
            <h3> 100 Proyectos <br> HTML, CSS y JS </h3>
        </div>

        <!--  -----  Logos -----  -->
        <div class="javascript__logos">

            <!--  -----  Logo de HTML -----  -->
            <a href="https://www.w3.org/html/" target="_blank" rel="noopener noreferrer">
                <img class="html__logo"
                    src="/01-victor-robles-web/05-desarrollo-web-100-proyectos-html-css-js/03-proyectos-javascript/assets/img/html/html-logo.svg"
                    alt="Logo HTML">
            </a>

            <!--  -----  Logo de CSS -----  -->
            <a href="https://www.w3.org/css/" target="_blank" rel="noopener noreferrer">
                <img class="css__logo" class="javascript__logo"
                    src="/01-victor-robles-web/05-desarrollo-web-100-proyectos-html-css-js/03-proyectos-javascript/assets/img/css/css-logo.svg"
                    alt="Logo CSS">
            </a>

            <!--  -----  Logo de JavaScript -----  -->
            <a href="https://www.javascript.com/" target="_blank" rel="noopener noreferrer">
                <img class="javascript__logo"
                    src="/01-victor-robles-web/05-desarrollo-web-100-proyectos-html-css-js/03-proyectos-javascript/assets/img/js/js-logo.svg"
                    alt="Banner JavaScript">
            </a>

        </div>

    </div>


</div>
